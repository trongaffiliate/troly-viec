<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trợ Lý Việc — Tự động xếp lịch</title>
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Trợ Lý Việc" />
<style>
  :root{
    --bg:#f5f6fb; --surface:#ffffff; --surface-2:#eef1fa;
    --text:#1b2334; --muted:#6b7385; --border:#e4e7f1;
    --accent:#4c6ef5; --accent-soft:#e6ecff;
    --p1:#e03131; --p1-soft:#ffe6e6;
    --p2:#e8830c; --p2-soft:#ffeed8;
    --p3:#4c6ef5; --p3-soft:#e6ecff;
    --p4:#7a8496; --p4-soft:#eceff4;
    --done:#2f9e44; --done-soft:#e4f6e8;
    --fixed:#5b4bd6; --fixed-soft:#ebe8fc;
    --habit:#0ca678; --habit-soft:#dcf6ee;
    --shadow:0 1px 2px rgba(30,40,80,.05), 0 8px 24px rgba(30,40,80,.07);
    --radius:14px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Apple Color Emoji",sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d1017; --surface:#161a24; --surface-2:#1e2434;
      --text:#e7ebf5; --muted:#98a1b5; --border:#2a3145;
      --accent:#7c93ff; --accent-soft:#1c2540;
      --p1:#ff8787; --p1-soft:#3a1c1c;
      --p2:#ffbf69; --p2-soft:#3a2a14;
      --p3:#7c93ff; --p3-soft:#1c2540;
      --p4:#98a1b5; --p4-soft:#252b3b;
      --done:#5bd97a; --done-soft:#153020;
      --fixed:#a5b0ff; --fixed-soft:#20233f;
      --habit:#34d3a6; --habit-soft:#12312a;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.45);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:840px;margin:0 auto;padding:20px 16px 90px}

  header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:12px;flex:none;background:linear-gradient(135deg,var(--accent),#134e4a);display:grid;place-items:center;color:#fff;font-size:22px;box-shadow:var(--shadow)}
  .title h1{font-size:20px;margin:0;letter-spacing:-.2px}
  .title p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .spacer{flex:1}
  .icon-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:18px;display:grid;place-items:center;transition:.15s}
  .icon-btn:hover{background:var(--surface-2)}

  .capture{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:16px}
  .capture textarea{width:100%;border:0;resize:vertical;min-height:64px;background:transparent;color:var(--text);font-family:inherit;font-size:16px;outline:none;padding:2px}
  .capture textarea::placeholder{color:var(--muted)}
  .capture-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .btn{border:0;border-radius:11px;padding:10px 16px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .btn-ghost{background:var(--surface-2);color:var(--text)}
  .mic{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .mic.recording{background:var(--p1-soft);color:var(--p1);border-color:transparent;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .hint{color:var(--muted);font-size:12.5px;margin-left:auto}

  .tabs{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;margin-bottom:16px}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);border:0;background:transparent;font-family:inherit;transition:.15s}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

  .plan-bar{display:flex;gap:10px;align-items:center;background:var(--accent-soft);border-radius:12px;padding:12px 14px;margin-bottom:16px;flex-wrap:wrap}
  .plan-bar .txt{font-size:13px;color:var(--accent);flex:1;min-width:180px}

  .group{margin-bottom:16px}
  .group-head{display:flex;align-items:baseline;gap:8px;margin:0 4px 8px}
  .group-head .day{font-weight:700;font-size:15px}
  .group-head .date{color:var(--muted);font-size:13px}
  .group-head .count{margin-left:auto;color:var(--muted);font-size:12.5px}
  .group.backlog .day{color:var(--p2)}
  .empty-day{color:var(--muted);font-size:13px;padding:6px 12px;border:1px dashed var(--border);border-radius:10px;background:var(--surface)}

  .block{display:flex;align-items:stretch;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden}
  .block .rail{width:5px;flex:none;background:var(--p3)}
  .block.pri-P1 .rail{background:var(--p1)} .block.pri-P2 .rail{background:var(--p2)} .block.pri-P3 .rail{background:var(--p3)} .block.pri-P4 .rail{background:var(--p4)}
  .block.fixed .rail{background:var(--fixed)}
  .block-in{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;flex:1;min-width:0}
  .block.done{opacity:.6}
  .block.done .b-title{text-decoration:line-through}
  .b-time{font-variant-numeric:tabular-nums;font-weight:700;font-size:13px;color:var(--muted);white-space:nowrap;padding-top:1px;min-width:96px}
  .check{width:22px;height:22px;flex:none;border-radius:7px;border:2px solid var(--border);cursor:pointer;display:grid;place-items:center;background:var(--surface);transition:.15s;color:#fff;font-size:14px;margin-top:1px}
  .check.on{background:var(--done);border-color:var(--done)}
  .b-body{flex:1;min-width:0}
  .b-title{font-size:15px;word-break:break-word}
  .b-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
  .pill{font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .pill.cat{background:var(--surface-2);color:var(--muted)}
  .pill.p-P1{background:var(--p1-soft);color:var(--p1)} .pill.p-P2{background:var(--p2-soft);color:var(--p2)} .pill.p-P3{background:var(--p3-soft);color:var(--p3)} .pill.p-P4{background:var(--p4-soft);color:var(--p4)}
  .pill.fx{background:var(--fixed-soft);color:var(--fixed)}
  .pill.late{background:var(--p1-soft);color:var(--p1)}
  .pill.dur{background:var(--surface-2);color:var(--muted)}
  .b-actions{display:flex;gap:2px;flex:none;align-items:center}
  .mini{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;transition:.15s}
  .mini:hover{background:var(--surface-2);color:var(--text)}
  .mini.on{color:var(--fixed)}

  /* Tab Việc (quản lý) */
  .trow{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:var(--shadow)}
  .trow .top{display:flex;align-items:center;gap:8px}
  .trow input.title{flex:1;border:0;background:transparent;color:var(--text);font-size:15px;font-family:inherit;outline:none;min-width:0}
  .trow .ctrls{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
  .sel,.inp{border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;font-family:inherit;font-size:12.5px;padding:4px 6px}
  .fixed-time{display:none;gap:6px;align-items:center}
  .fixed-time.show{display:flex}
  .lbl{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}

  .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .chip{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit}
  .chip.active{background:var(--accent);color:#fff;border-color:transparent}
  .empty-state{text-align:center;color:var(--muted);padding:44px 20px}
  .empty-state .big{font-size:40px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-size:22px;font-weight:800;line-height:1.1}
  .stat .l{font-size:12px;color:var(--muted);margin-top:3px}
  .stat.done .n{color:var(--done)} .stat.plan .n{color:var(--accent)} .stat.late .n{color:var(--p1)}
  .report-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .report-card h2{font-size:17px;margin:14px 0 8px} .report-card h2:first-child{margin-top:0}
  .report-card ul{margin:6px 0 12px;padding-left:20px} .report-card li{margin:4px 0} .report-card p{margin:8px 0}
  @media (max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.b-time{min-width:82px}}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;place-items:center;padding:16px;z-index:50}
  .overlay.open{display:grid}
  .modal{background:var(--surface);border-radius:16px;max-width:480px;width:100%;padding:20px;box-shadow:var(--shadow);max-height:92vh;overflow:auto}
  .modal h2{margin:0 0 4px;font-size:18px}
  .modal p.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .sec-title{font-size:13px;font-weight:700;color:var(--accent);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  .field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;outline:none}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .checkrow{display:flex;gap:16px;align-items:center;font-size:14px;margin-bottom:12px;flex-wrap:wrap}
  .checkrow label{display:inline-flex;gap:6px;align-items:center;cursor:pointer}
  .note{font-size:12px;color:var(--muted);background:var(--surface-2);padding:10px 12px;border-radius:10px;line-height:1.5}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== Lịch dạng lưới tuần (kiểu Reclaim) ===== */
  .cal-tools{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .cal-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:16px;background:var(--surface);box-shadow:var(--shadow)}
  .cal{min-width:760px}
  .cal-head,.cal-body{display:grid;grid-template-columns:52px repeat(7,minmax(104px,1fr))}
  .cal-head{border-bottom:1px solid var(--border)}
  .cal-head .dh{padding:9px 4px 8px;text-align:center;border-left:1px solid var(--border)}
  .cal-head .dh .wd{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.4px}
  .cal-head .dh .dn{font-size:16px;font-weight:700;margin-top:3px}
  .cal-head .dh.today .dn{color:#fff;background:var(--accent);width:28px;height:28px;line-height:28px;border-radius:50%;display:inline-block;margin-top:3px}
  .cal-gutter{position:relative}
  .cal-gutter .hr{position:absolute;right:6px;font-size:11px;color:var(--muted);transform:translateY(-7px);font-variant-numeric:tabular-nums}
  .cal-col{position:relative;border-left:1px solid var(--border);background:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--hh) - 1px),var(--border) calc(var(--hh) - 1px),var(--border) var(--hh))}
  .nowline{position:absolute;left:0;right:0;height:2px;background:#e8590c;z-index:4}
  .nowline::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#e8590c}
  .ev{position:absolute;border-radius:8px;padding:3px 6px;overflow:hidden;box-shadow:0 1px 2px rgba(30,40,80,.08);z-index:1;min-height:20px}
  .ev .et{font-size:10px;font-weight:700;opacity:.8;line-height:1.15}
  .ev .en{font-size:11.5px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:14px}
  .ev.done{opacity:.55}
  .ev.done .en{text-decoration:line-through}
  .ev-fixed{background:var(--fixed-soft);color:var(--fixed)}
  .ev-habit{background:var(--habit-soft);color:var(--habit)}
  .ev-P1{background:var(--p1-soft);color:var(--p1)}
  .ev-P2{background:var(--p2-soft);color:var(--p2)}
  .ev-P3{background:var(--p3-soft);color:var(--p3)}
  .ev-P4{background:var(--p4-soft);color:var(--p4)}
  .ev .dot{position:absolute;top:3px;right:4px;width:15px;height:15px;border-radius:5px;border:1.5px solid currentColor;cursor:pointer;display:grid;place-items:center;font-size:10px;background:transparent;opacity:.7}
  .ev .dot.on{background:var(--done);border-color:var(--done);color:#fff;opacity:1}
  @media (max-width:560px){.cal-head,.cal-body{grid-template-columns:44px repeat(7,minmax(92px,1fr))}}
</style>

<div class="wrap">
  <header>
    <div class="logo">🌿</div>
    <div class="title">
      <h1>Trợ Lý Việc</h1>
      <p id="subtitle">Nói ý tưởng — AI tự nhét vào ô giờ trống</p>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="btnSettings" title="Cài đặt">⚙️</button>
  </header>

  <div class="capture">
    <textarea id="input" placeholder="Ví dụ: Họp với đối tác 9h sáng mai 1 tiếng. Làm báo giá cho khách Hùng, khoảng 2 tiếng, gấp, xong trước thứ sáu."></textarea>
    <div class="capture-row">
      <button class="btn btn-primary" id="btnAdd">＋ Thêm việc</button>
      <button class="btn mic" id="btnMic" title="Nói">🎤 Nói</button>
      <button class="btn btn-ghost" id="btnClear">Xoá</button>
      <span class="hint" id="modeHint">Chế độ cơ bản</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="plan">📅 Lịch</button>
    <button class="tab" data-tab="tasks">📋 Việc</button>
    <button class="tab" data-tab="habits">🔁 Thói quen</button>
    <button class="tab" data-tab="report">📊 Báo cáo</button>
  </div>

  <div id="view"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Cài đặt</h2>
    <p class="sub">Chỉnh giờ làm việc để AI xếp lịch đúng nhịp của anh.</p>

    <div class="sec-title">Giờ làm việc</div>
    <div class="row2">
      <div class="field"><label>Bắt đầu</label><input type="time" id="workStart"></div>
      <div class="field"><label>Kết thúc</label><input type="time" id="workEnd"></div>
    </div>
    <div class="checkrow"><label><input type="checkbox" id="lunchOn"> Nghỉ trưa</label></div>
    <div class="row2">
      <div class="field"><label>Nghỉ từ</label><input type="time" id="lunchStart"></div>
      <div class="field"><label>Đến</label><input type="time" id="lunchEnd"></div>
    </div>
    <div class="checkrow">
      <label><input type="checkbox" id="workSat"> Làm thứ Bảy</label>
      <label><input type="checkbox" id="workSun"> Làm Chủ nhật</label>
    </div>

    <div class="sec-title">Trợ lý AI (không bắt buộc)</div>
    <div class="field">
      <label>Chìa khoá API (Anthropic)</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Chọn "não" AI</label>
      <select id="model">
        <option value="claude-opus-4-8">Opus 4.8 — thông minh nhất (mặc định)</option>
        <option value="claude-haiku-4-5">Haiku 4.5 — nhanh & rẻ hơn</option>
      </select>
    </div>
    <div class="note">🔒 Chìa khoá chỉ lưu <b>trên máy này</b>. Cách lấy: vào <b>console.anthropic.com</b> → mục <b>API Keys</b> → tạo key → dán vào đây.</div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCloseSettings">Đóng</button>
      <button class="btn btn-primary" id="btnSaveSettings">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* =========================================================================
   TRỢ LÝ VIỆC — tự động xếp lịch kiểu Reclaim (chạy hoàn toàn trên máy anh)
   Ý tưởng: mỗi việc có thời lượng + ưu tiên + hạn chót. AI/bộ máy nhét việc
   vào các ô giờ trống trong giờ làm việc, quanh các lịch cố định. Việc chưa
   xong sẽ tự dời sang ô trống kế tiếp mỗi lần "Lên lịch".
   ========================================================================= */
const LS_TASKS='trolyviec_tasks_v2', LS_SET='trolyviec_set_v2', LS_HAB='trolyviec_hab_v2';
const HORIZON=14; // xếp lịch trong 14 ngày tới
const PR_LABEL={P1:'Rất gấp',P2:'Quan trọng',P3:'Bình thường',P4:'Thong thả'};
const CATS=['Họp','Gọi điện','Email','Khách hàng','Tài chính','Nhân sự','Marketing','Cá nhân','Khác'];

let tasks=load(LS_TASKS,[]);
let habits=load(LS_HAB,[]);
let habitBlocks=[];
let settings=Object.assign({apiKey:'',model:'claude-opus-4-8',workStart:'08:00',workEnd:'18:00',lunchOn:true,lunchStart:'12:00',lunchEnd:'13:30',workSat:true,workSun:false,buffer:10,maxChunk:120,minChunk:30}, load(LS_SET,{}));
let currentTab='plan', taskFilter='chua', lastReport=null;

/* ---------- Tiện ích ---------- */
function load(k,def){ try{return JSON.parse(localStorage.getItem(k))??def;}catch(e){return def;} }
function save(){ localStorage.setItem(LS_TASKS,JSON.stringify(tasks)); localStorage.setItem(LS_HAB,JSON.stringify(habits)); localStorage.setItem(LS_SET,JSON.stringify(settings)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
const WD=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
function weekdayVN(d){ return WD[d.getDay()]; }
function fmtDate(s){ const [y,m,dd]=s.split('-'); return dd+'/'+m; }
function hhmm(iso){ const d=new Date(iso); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function endHHMM(iso,min){ const d=new Date(Date.parse(iso)+min*60000); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function setTimeMs(day,hhmmStr){ const [h,m]=hhmmStr.split(':').map(Number); const d=new Date(day); d.setHours(h,m,0,0); return d.getTime(); }
function workDaysArr(){ const a=[1,2,3,4,5]; if(settings.workSat)a.push(6); if(settings.workSun)a.push(0); return a; }

/* ---------- Chuyển dữ liệu cũ sang mô hình mới ---------- */
function migrate(){
  tasks.forEach(t=>{
    if(!t.priority || ['cao','vừa','thấp'].includes(t.priority)) t.priority={cao:'P1','vừa':'P3','thấp':'P4'}[t.priority]||'P3';
    if(!['P1','P2','P3','P4'].includes(t.priority)) t.priority='P3';
    if(t.durationMin==null) t.durationMin=(t.category==='Họp')?60:30;
    if(t.fixed==null) t.fixed=!!(t.time&&t.date);
    if(t.fixed&&!t.fixedStart&&t.date) t.fixedStart=t.date+'T'+(t.time||'09:00');
    if(!Array.isArray(t.blocks)) t.blocks=[];
    if(t.locked==null) t.locked=false;
    if(!t.category) t.category='Khác';
  });
  if(!Array.isArray(habits)) habits=[];
  habits.forEach(h=>{
    if(!Array.isArray(h.days)) h.days=[1,2,3,4,5];
    if(!Array.isArray(h.doneDates)) h.doneDates=[];
    if(h.active==null) h.active=true;
    if(!h.durationMin) h.durationMin=30;
    if(!['P1','P2','P3','P4'].includes(h.priority)) h.priority='P3';
    if(!h.category) h.category='Cá nhân';
    if(h.time==null) h.time='';
  });
}

/* =========================================================================
   BỘ MÁY XẾP LỊCH TỰ ĐỘNG
   ========================================================================= */
function score(t){
  const pr={P1:100,P2:60,P3:30,P4:10}[t.priority]||30;
  let urg=0;
  if(t.due){ const days=(Date.parse(t.due+'T00:00:00')-today().getTime())/86400000; urg=Math.max(0,120-days*15); }
  return pr+urg;
}
function dayWindows(day){
  const ws=setTimeMs(day,settings.workStart), we=setTimeMs(day,settings.workEnd);
  if(we<=ws) return [];
  if(settings.lunchOn){
    const ls=setTimeMs(day,settings.lunchStart), le=setTimeMs(day,settings.lunchEnd);
    return [{s:ws,e:Math.min(ls,we)},{s:Math.max(le,ws),e:we}].filter(w=>w.e>w.s);
  }
  return [{s:ws,e:we}];
}
function subtract(free,busy){
  const res=[]; free.sort((a,b)=>a.s-b.s); busy=busy.slice().sort((a,b)=>a.s-b.s);
  for(const f of free){
    let segs=[{s:f.s,e:f.e}];
    for(const b of busy){
      const nx=[];
      for(const seg of segs){
        if(b.e<=seg.s||b.s>=seg.e){ nx.push(seg); continue; }
        if(b.s>seg.s) nx.push({s:seg.s,e:b.s});
        if(b.e<seg.e) nx.push({s:b.e,e:seg.e});
      }
      segs=nx;
    }
    res.push(...segs);
  }
  return res.filter(x=>x.e-x.s>=60000).sort((a,b)=>a.s-b.s);
}
function buildFree(){
  const busy=[];
  tasks.forEach(t=>{
    if(t.status==='done') return;
    if((t.fixed||t.locked)&&t.blocks) t.blocks.forEach(b=>busy.push({s:Date.parse(b.start),e:Date.parse(b.start)+b.min*60000}));
  });
  const now=Math.ceil(Date.now()/(15*60000))*(15*60000);
  const days=workDaysArr(), free=[];
  for(let i=0;i<HORIZON;i++){
    const day=addDays(today(),i);
    if(!days.includes(day.getDay())) continue;
    dayWindows(day).forEach(w=>{ const s=(i===0)?Math.max(w.s,now):w.s; if(s<w.e) free.push({s,e:w.e}); });
  }
  return subtract(free,busy);
}
function runScheduler(){
  // Lịch cố định: dựng lại khối từ giờ đã đặt
  tasks.forEach(t=>{ if(t.fixed&&t.fixedStart) t.blocks=[{start:t.fixedStart,min:t.durationMin}]; });
  // Việc linh hoạt chưa khoá & chưa xong: xoá khối cũ để xếp lại (tự dời lịch)
  tasks.forEach(t=>{ if(!t.fixed&&!t.locked&&t.status!=='done'){ t.blocks=[]; t._leftover=0; } });

  // Sinh các buổi cho THÓI QUEN trong 14 ngày tới
  habitBlocks=[];
  const fixedHabitBusy=[], flexHabitOcc=[];
  for(const h of habits){ if(h.active===false) continue;
    for(let i=0;i<HORIZON;i++){ const day=addDays(today(),i); if(!(h.days||[]).includes(day.getDay())) continue;
      if(h.time){ const s=setTimeMs(day,h.time); if(i===0&&s<Date.now()) continue;
        habitBlocks.push({habit:h,start:new Date(s).toISOString(),min:h.durationMin});
        fixedHabitBusy.push({s,e:s+h.durationMin*60000});
      } else { flexHabitOcc.push({h,day}); }
    }
  }

  let free=subtract(buildFree(), fixedHabitBusy);
  const BUF=settings.buffer||0, MAXC=settings.maxChunk||120, MINC=settings.minChunk||30;

  // Đặt thói quen linh hoạt trước (đúng ngày của nó, ô trống sớm nhất)
  for(const occ of flexHabitOcc){
    const dayStr=ymd(occ.day), need=occ.h.durationMin;
    for(let k=0;k<free.length;k++){ const iv=free[k]; if(ymd(new Date(iv.s))!==dayStr) continue;
      const avail=(iv.e-iv.s)/60000; if(avail>=Math.min(need,MINC)){ const chunk=Math.min(need,avail);
        habitBlocks.push({habit:occ.h,start:new Date(iv.s).toISOString(),min:chunk});
        const ns=iv.s+(chunk+BUF)*60000; if(ns>=iv.e) free.splice(k,1); else iv.s=ns; break; }
    }
  }

  // Đặt việc linh hoạt vào ô trống còn lại
  const list=tasks.filter(t=>!t.fixed&&!t.locked&&t.status!=='done').sort((a,b)=>score(b)-score(a));
  let unplaced=0;
  for(const t of list){
    let rem=t.durationMin||30; t.blocks=[]; let guard=0;
    while(rem>0 && guard++<50){
      const need=Math.min(MINC,rem);
      const idx=free.findIndex(iv=>(iv.e-iv.s)/60000>=need);
      if(idx<0) break;
      const iv=free[idx]; const avail=Math.floor((iv.e-iv.s)/60000);
      const chunk=Math.min(rem,MAXC,avail);
      t.blocks.push({start:new Date(iv.s).toISOString(),min:chunk});
      rem-=chunk; const ns=iv.s+(chunk+BUF)*60000;
      if(ns>=iv.e) free.splice(idx,1); else iv.s=ns;
    }
    t._leftover=rem; if(rem>0) unplaced++;
  }
  save(); return unplaced;
}

/* =========================================================================
   GỌI AI (Claude) — tách việc + ước lượng thời lượng, ưu tiên
   ========================================================================= */
async function callClaude(system,userText,maxTokens,schema){
  const body={model:settings.model||'claude-opus-4-8',max_tokens:maxTokens,system,messages:[{role:'user',content:userText}]};
  if(schema) body.output_config={format:{type:'json_schema',schema}};
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
  if(!res.ok){ throw new Error('API '+res.status+': '+(await res.text()).slice(0,200)); }
  const data=await res.json();
  const b=(data.content||[]).find(x=>x.type==='text');
  return b?b.text:'';
}
const PARSE_SCHEMA={type:'object',properties:{tasks:{type:'array',items:{type:'object',properties:{
  title:{type:'string'}, fixed:{type:'boolean'}, date:{type:'string'}, time:{type:'string'},
  durationMin:{type:'integer'}, priority:{type:'string',enum:['P1','P2','P3','P4']}, category:{type:'string'}
},required:['title','fixed','date','time','durationMin','priority','category'],additionalProperties:false}}},required:['tasks'],additionalProperties:false};

async function aiParse(text){
  const t=today();
  const sys=`Bạn là trợ lý sắp lịch cho người làm kinh doanh ở Việt Nam. Người dùng nói/gõ ý tưởng công việc bằng tiếng Việt (có thể nhiều việc). Tách thành các công việc riêng, mỗi việc gồm:
- title: mô tả ngắn gọn tiếng Việt.
- fixed: true nếu là cuộc hẹn/họp có giờ cố định; false nếu là việc linh hoạt (có thể xếp vào giờ trống bất kỳ).
- date: "YYYY-MM-DD". Hôm nay ${ymd(t)} (${weekdayVN(t)}). Suy luận ngày tương đối. Nếu không rõ, để "".
- time: "HH:MM" 24h nếu có giờ cụ thể, ngược lại "".
- durationMin: thời lượng ước tính theo phút (họp ngắn 30-60, việc thường 30-120). Nếu người dùng nói "2 tiếng" = 120.
- priority: P1 nếu gấp/khẩn, P2 nếu quan trọng, P4 nếu thong thả, còn lại P3.
- category: một trong ${CATS.join(', ')}.
Chỉ trả về dữ liệu.`;
  let raw=(await callClaude(sys,text,1200,PARSE_SCHEMA)).replace(/```json|```/g,'').trim();
  const obj=JSON.parse(raw); const arr=Array.isArray(obj)?obj:(obj.tasks||[]);
  return arr.map(x=>{
    const hasTime=/^\d{1,2}:\d{2}$/.test(x.time||'');
    let date=/^\d{4}-\d{2}-\d{2}$/.test(x.date||'')?x.date:null;
    let fixed=!!x.fixed && hasTime;
    if(fixed && !date) date=ymd(t);
    return {id:uid(),title:(x.title||text).trim(),category:CATS.includes(x.category)?x.category:'Khác',
      priority:['P1','P2','P3','P4'].includes(x.priority)?x.priority:'P3',
      durationMin:Math.max(15,Math.min(480, +x.durationMin||30)),
      due:(!fixed&&date)?date:null, fixed, fixedStart:fixed?date+'T'+x.time:null,
      status:'chua',locked:false,blocks:[],createdAt:new Date().toISOString(),doneAt:null};
  });
}

/* ---------- Bộ đọc tiếng Việt cơ bản (không cần AI) ---------- */
const WMAP={'chủ nhật':0,'cn':0,'thứ hai':1,'thu 2':1,'thứ 2':1,'t2':1,'thứ ba':2,'thứ 3':2,'t3':2,'thứ tư':3,'thứ 4':3,'t4':3,'thứ năm':4,'thứ 5':4,'t5':4,'thứ sáu':5,'thứ 6':5,'t6':5,'thứ bảy':6,'thứ 7':6,'t7':6};
function nextWeekday(tg){ const t=today(); for(let i=0;i<7;i++){ const d=addDays(t,i); if(d.getDay()===tg) return d; } return t; }
function detectDate(s){
  if(/hôm nay/.test(s)) return ymd(today());
  if(/ngày kia|ngày mốt|\bmốt\b/.test(s)) return ymd(addDays(today(),2));
  if(/ngày mai|\bmai\b/.test(s)) return ymd(addDays(today(),1));
  if(/tuần sau/.test(s)) return ymd(addDays(today(),7));
  if(/cuối tuần/.test(s)) return ymd(nextWeekday(6));
  for(const k in WMAP){ if(s.includes(k)) return ymd(nextWeekday(WMAP[k])); }
  let m=s.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
  if(m){ let d=+m[1],mo=+m[2]-1,y=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):today().getFullYear(); const dt=new Date(y,mo,d); if(!m[3]&&dt<today())dt.setFullYear(y+1); if(!isNaN(dt))return ymd(dt); }
  return null;
}
function detectTime(s){
  const m=s.match(/(\d{1,2})\s*(?:h|giờ|:)\s*(\d{1,2})?/); if(!m) return null;
  let h=+m[1],mi=m[2]?+m[2]:0; if(h>23||mi>59) return null;
  const near=s.slice(Math.max(0,m.index-6),m.index+m[0].length+8);
  if(/chiều|tối/.test(near)&&h<12)h+=12; else if(/sáng/.test(near)&&h===12)h=0;
  return pad(h)+':'+pad(mi);
}
function detectDuration(s){
  let m=s.match(/(\d+(?:[.,]\d+)?)\s*(tiếng|giờ|h\b)/); if(m) return Math.round(parseFloat(m[1].replace(',','.'))*60);
  m=s.match(/(\d+)\s*phút/); if(m) return +m[1];
  return null;
}
function detectPriority(s){
  if(/gấp|khẩn|quan trọng nhất|ưu tiên|asap/.test(s)) return 'P1';
  if(/quan trọng|cần|phải/.test(s)) return 'P2';
  if(/khi rảnh|thong thả|không gấp|nhẹ nhàng/.test(s)) return 'P4';
  return 'P3';
}
function detectCategory(s){
  if(/họp|meeting/.test(s)) return 'Họp';
  if(/gọi|call|điện thoại/.test(s)) return 'Gọi điện';
  if(/email|mail/.test(s)) return 'Email';
  if(/khách|client|đối tác/.test(s)) return 'Khách hàng';
  if(/tiền|thanh toán|hoá đơn|hóa đơn|lương|ngân hàng|báo giá|tài chính/.test(s)) return 'Tài chính';
  if(/nhân viên|tuyển|nhân sự|phỏng vấn/.test(s)) return 'Nhân sự';
  if(/quảng cáo|marketing|fanpage|content|bài đăng/.test(s)) return 'Marketing';
  return 'Khác';
}
function ruleParse(text){
  const parts=text.split(/\n+|(?<=[.!;])\s+/).map(x=>x.trim()).filter(x=>x.length>1);
  return (parts.length?parts:[text.trim()]).map(t=>{
    const s=t.toLowerCase();
    const date=detectDate(s), time=detectTime(s);
    const fixed=!!time; const fdate=date||(fixed?ymd(today()):null);
    const cat=detectCategory(s);
    return {id:uid(),title:t.replace(/\s+/g,' ').trim(),category:cat,priority:detectPriority(s),
      durationMin:detectDuration(s)||(cat==='Họp'?60:30),
      due:(!fixed&&date)?date:null, fixed, fixedStart:fixed?fdate+'T'+time:null,
      status:'chua',locked:false,blocks:[],createdAt:new Date().toISOString(),doneAt:null};
  });
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function evEl(e,sH,hh){

function renderPlan(view){

  const scroll=document.createElement('div'); scroll.className='cal-scroll';

  cal.appendChild(head);

  const body=document.createElement('div'); body.className='cal-body';
  const gut=document.createElement('div'); gut.className='cal-gutter'; gut.style.height=totalH+'px';
  for(let h=sH;h<=eH;h++){ const l=document.createElement('div'); l.className='hr'; l.style.top=((h-sH)*hh)+'px'; l.textContent=h+':00'; gut.appendChild(l); }
  body.appendChild(gut);

  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  for(let i=0;i<7;i++){
    const col=document.createElement('div'); col.className='cal-col'; col.style.height=totalH+'px';
    const evs=cols[i].map(e=>Object.assign({},e,{_s:Date.parse(e.start),_e:Date.parse(e.start)+e.min*60000})).sort((a,b)=>a._s-b._s);
    // chia làn cho các khối chồng giờ
    let cl=[],curEnd=0; const clusters=[];
    evs.forEach(e=>{ if(cl.length && e._s>=curEnd){ clusters.push(cl); cl=[]; curEnd=0; } cl.push(e); curEnd=Math.max(curEnd,e._e); });
    if(cl.length) clusters.push(cl);
    clusters.forEach(group=>{ const lanes=[]; group.forEach(e=>{ let p=false; for(let li=0;li<lanes.length;li++){ if(e._s>=lanes[li]){ e._lane=li; lanes[li]=e._e; p=true; break; } } if(!p){ e._lane=lanes.length; lanes.push(e._e); } }); group.forEach(e=>e._lc=lanes.length); });
    evs.forEach(e=>col.appendChild(evEl(e,sH,hh)));
    if(i===0 && nowMin>=sH*60 && nowMin<=eH*60){ const nl=document.createElement('div'); nl.className='nowline'; nl.style.top=((nowMin-sH*60)/60*hh)+'px'; col.appendChild(nl); }
    body.appendChild(col);
  }
  cal.appendChild(body);
  scroll.appendChild(cal); view.appendChild(scroll);

  // Việc chưa xếp được
  const backlog=tasks.filter(t=>t.status!=='done'&&!t.fixed&&(!t.blocks||t.blocks.length===0));
  if(backlog.length){
    const g=document.createElement('div'); g.className='group backlog'; g.style.marginTop='16px';
    g.innerHTML='<div class="group-head"><span class="day">📥 Chưa xếp được</span><span class="count">'+backlog.length+' việc</span></div>';
    backlog.sort((a,b)=>score(b)-score(a)).forEach(t=>g.appendChild(blockEl(t,{start:null,min:t.durationMin})));
    view.appendChild(g);
  }
}

function weekRange(){ const t=today(); return {start:ymd(addDays(t,-6)),end:ymd(t)}; }
function reportData(){
  const {start,end}=weekRange();
  const inWeek=iso=>iso&&iso.slice(0,10)>=start&&iso.slice(0,10)<=end;
  let planMin=0, doneMin=0; const byCat={};
  tasks.forEach(t=>{
    (t.blocks||[]).forEach(b=>{ if(inWeek(b.start)){ planMin+=b.min; byCat[t.category]=(byCat[t.category]||0)+b.min; } });
    if(t.status==='done'&&inWeek(t.doneAt)) doneMin+=t.durationMin;
  });
  const late=tasks.filter(t=>t.status!=='done'&&t.due&&t.due<ymd(today())).length;
  const doneList=tasks.filter(t=>t.status==='done'&&inWeek(t.doneAt));
  const todoList=tasks.filter(t=>t.status!=='done');
  return {planMin,doneMin,late,byCat,doneList,todoList};
}
function hoursTxt(min){ const h=Math.floor(min/60),m=min%60; return (h?h+'h':'')+(m?m+'′':'')||'0'; }

function ruleReport(d){
  const t=today();
  let md=`## Báo cáo tuần (đến ${fmtDate(ymd(t))})\n`;
  md+=`Tuần này anh đã lên lịch **${hoursTxt(d.planMin)}** công việc, hoàn thành **${hoursTxt(d.doneMin)}**`;
  md+=d.late?`, còn **${d.late}** việc quá hạn cần xử lý.\n`:`.\n`;
  md+=`\n## ✅ Đã làm\n`+(d.doneList.length?d.doneList.map(x=>`- ${x.title}`).join('\n')+'\n':'- (chưa đánh dấu việc nào xong)\n');
  md+=`\n## ⏳ Cần chú ý\n`+(d.todoList.length?d.todoList.slice(0,12).map(x=>`- ${x.title}${x.due?` (hạn ${fmtDate(x.due)})`:''}`).join('\n')+'\n':'- (không còn việc tồn)\n');
  md+=`\n## 📂 Thời gian theo nhóm\n`+Object.entries(d.byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`- ${k}: ${hoursTxt(v)}`).join('\n')+'\n';
  return md;
}
async function aiReport(d){
  const sys=`Bạn là trợ lý cho người làm kinh doanh ở Việt Nam. Viết báo cáo tuần NGẮN GỌN, ấm áp, chuyên nghiệp bằng tiếng Việt dựa trên dữ liệu JSON. Gồm: (1) một câu tổng kết; (2) mục "Đã làm"; (3) mục "Chưa làm / cần chú ý"; (4) 2-3 gợi ý cụ thể cho tuần tới. Dùng markdown đơn giản (## tiêu đề, - gạch đầu dòng, **nhấn mạnh**). Không chào máy móc.`;
  const payload=JSON.stringify({hom_nay:ymd(today()),gio_len_lich:d.planMin,gio_hoan_thanh:d.doneMin,so_qua_han:d.late,theo_nhom:d.byCat,da_lam:d.doneList.map(x=>x.title),chua_lam:d.todoList.map(x=>({title:x.title,priority:x.priority,due:x.due}))});
  return await callClaude(sys,payload,1500,null);
}
function mdToHtml(md){
  const lines=md.split('\n'); let html='',inList=false;
  const inl=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  for(let line of lines){ line=line.trim();
    if(/^##\s+/.test(line)){ if(inList){html+='</ul>';inList=false;} html+='<h2>'+inl(line.replace(/^##\s+/,''))+'</h2>'; }
    else if(/^-\s+/.test(line)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inl(line.replace(/^-\s+/,''))+'</li>'; }
    else if(line===''){ if(inList){html+='</ul>';inList=false;} }
    else { if(inList){html+='</ul>';inList=false;} html+='<p>'+inl(line)+'</p>'; }
  } if(inList)html+='</ul>'; return html;
}

  [['plan','Đã lên lịch',hoursTxt(d.planMin)],['done','Hoàn thành',hoursTxt(d.doneMin)],['late','Quá hạn',d.late],['','Việc tồn',d.todoList.length]].forEach(([cls,l,n])=>{

/* ---------- Xuất .ics cho Google Calendar ---------- */
function exportICS(){
  const evs=[];
  tasks.forEach(t=>(t.blocks||[]).forEach(b=>evs.push({start:b.start,min:b.min,title:t.title,cat:t.category})));
  habitBlocks.forEach(hb=>evs.push({start:hb.start,min:hb.min,title:hb.habit.title,cat:hb.habit.category}));
  if(!evs.length){ toast('Chưa có lịch để xuất — bấm ⚡ Lên lịch trước'); return; }
  const esc=s=>String(s).replace(/[\\,;]/g,'\\$&').replace(/\n/g,'\\n');
  const dt=iso=>{ const d=new Date(iso); return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00'; };
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TroLyViec//VN//\r\nCALSCALE:GREGORIAN\r\n';
  evs.forEach((e,i)=>{ const s=dt(e.start), en=dt(new Date(Date.parse(e.start)+e.min*60000).toISOString());
    ics+='BEGIN:VEVENT\r\nUID:tlv-'+i+'-'+Date.now()+'@trolyviec\r\nDTSTAMP:'+dt(new Date().toISOString())+'\r\nDTSTART:'+s+'\r\nDTEND:'+en+'\r\nSUMMARY:'+esc(e.title)+'\r\nDESCRIPTION:'+esc('Nhóm: '+e.cat+' · từ Trợ Lý Việc')+'\r\nEND:VEVENT\r\n'; });
  ics+='END:VCALENDAR\r\n';
  const blob=new Blob([ics],{type:'text/calendar'}), url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='troly-viec-lich.ics'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Đã tải file .ics — vào Google Calendar → Cài đặt → Nhập & xuất → chọn file này');
}

  recog.onstart=()=>{ recording=true; btn.classList.add('recording'); btn.textContent='⏹ Dừng'; base=document.getElementById('input').value; };
  recog.onresult=e=>{ let txt=''; for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript; document.getElementById('input').value=(base?base+' ':'')+txt; };
  recog.onerror=e=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤 Nói'; toast(e.error==='not-allowed'?'Trình duyệt chặn micro — hãy cho phép, hoặc gõ tay.':'Không nghe được — thử lại hoặc gõ tay.'); };
  recog.onend=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤 Nói'; };
  btn.onclick=()=>{ if(recording)recog.stop(); else{ try{recog.start();}catch(e){toast('Thử lại sau một giây.');} } };
}

/* ---------- Sự kiện ---------- */
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ currentTab=b.dataset.tab; setActiveTab(); render(); });
document.getElementById('btnAdd').onclick=handleAdd;
document.getElementById('btnClear').onclick=()=>document.getElementById('input').value='';
document.getElementById('input').addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') handleAdd(); });

const overlay=document.getElementById('overlay');
document.getElementById('btnSettings').onclick=()=>{
  ['workStart','workEnd','lunchStart','lunchEnd','model'].forEach(id=>document.getElementById(id).value=settings[id]);
  document.getElementById('apiKey').value=settings.apiKey;
  document.getElementById('lunchOn').checked=settings.lunchOn;
  document.getElementById('workSat').checked=settings.workSat;
  document.getElementById('workSun').checked=settings.workSun;
  overlay.classList.add('open');
};
document.getElementById('btnCloseSettings').onclick=()=>overlay.classList.remove('open');
overlay.onclick=e=>{ if(e.target===overlay) overlay.classList.remove('open'); };
document.getElementById('btnSaveSettings').onclick=()=>{
  ['workStart','workEnd','lunchStart','lunchEnd','model'].forEach(id=>settings[id]=document.getElementById(id).value);
  settings.apiKey=document.getElementById('apiKey').value.trim();
  settings.lunchOn=document.getElementById('lunchOn').checked;
  settings.workSat=document.getElementById('workSat').checked;
  settings.workSun=document.getElementById('workSun').checked;
  save(); overlay.classList.remove('open'); runScheduler(); render();
  toast(settings.apiKey?'Đã lưu & xếp lại lịch ✨':'Đã lưu & xếp lại lịch');
};

/* ---------- Khởi động ---------- */
migrate(); runScheduler(); setupMic(); injectIcon(); render();
</script>
